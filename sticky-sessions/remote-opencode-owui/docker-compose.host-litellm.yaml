name: sticky-owui-opencode

services:
  smg:
    image: ${SGLANG_IMAGE:-lmsysorg/sglang:dev-cu13}
    container_name: sticky-test-smg
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${SMG_PORT:-30100}:30000"
      - "127.0.0.1:${SMG_METRICS_PORT:-29100}:29000"
    volumes:
      - /data/scratch/hf/Qwen/Qwen3.6-27B-FP8:/models/Qwen3.6-27B-FP8:ro
    entrypoint: ["python3", "-m", "sglang_router.launch_router"]
    command:
      - --host=0.0.0.0
      - --port=30000
      - --worker-urls=http://host.docker.internal:30000
      - --tokenizer-path=/models/Qwen3.6-27B-FP8
      - --policy=manual
      - --assignment-mode=${SMG_ASSIGNMENT_MODE:-min_group}
      - --max-idle-secs=${SMG_MAX_IDLE_SECS:-14400}
      - --prometheus-host=0.0.0.0
      - --prometheus-port=29000
      - --health-check-endpoint=/health
      - --health-check-timeout-secs=10
      - --health-check-interval-secs=5
      - --worker-startup-timeout-secs=900
      - --request-timeout-secs=1800
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:30000/v1/models', timeout=5)\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 90
      start_period: 10s

  open-webui:
    image: ${OPENWEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    container_name: sticky-test-openwebui
    restart: unless-stopped
    depends_on:
      smg:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${OPENWEBUI_PORT:-8090}:8080"
    environment:
      WEBUI_AUTH: "true"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-sticky-test-openwebui-secret}
      WEBUI_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL:-admin@example.com}
      WEBUI_ADMIN_PASSWORD: ${WEBUI_ADMIN_PASSWORD:-admin-password}
      WEBUI_ADMIN_NAME: ${WEBUI_ADMIN_NAME:-Admin}
      ENABLE_OLLAMA_API: "false"
      ENABLE_OPENAI_API: "true"
      ENABLE_OPENAI_API_PASSTHROUGH: "false"
      ENABLE_FORWARD_USER_INFO_HEADERS: "true"
      OPENAI_API_BASE_URL: http://host.docker.internal:4010/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY:-sk-sticky-test}
      DEFAULT_MODELS: ${OPENWEBUI_DEFAULT_MODEL:-qwen}
    volumes:
      - ./openwebui-data:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 30s

  owui-sticky-wrapper:
    image: ${OPENWEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    container_name: sticky-test-owui-sticky-wrapper
    restart: unless-stopped
    depends_on:
      open-webui:
        condition: service_healthy
    ports:
      - "127.0.0.1:${OWUI_WRAPPER_PORT:-8091}:8080"
    environment:
      OWUI_UPSTREAM: http://open-webui:8080
      WRAPPER_HOST: 0.0.0.0
      WRAPPER_PORT: "8080"
      WRAPPER_ALLOWED_PATHS: /api/chat/completions,/api/v1/chat/completions,/openai/chat/completions,/openai/v1/chat/completions
    volumes:
      - ./owui_sticky_wrapper.py:/wrapper/owui_sticky_wrapper.py:ro
    entrypoint: ["python3", "/wrapper/owui_sticky_wrapper.py"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 5s
