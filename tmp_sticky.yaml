services:
  sglang:
    image: ${SGLANG_IMAGE:-lmsysorg/sglang:v0.5.12-cu130}
    container_name: sglang-qwen3-worker
    restart: always
    stop_grace_period: 1m

    ipc: host
    shm_size: 32gb

    cap_add:
      - SYS_NICE

    ports:
      - "30001:30000"
      - "8001:8001"

    environment:
      TRITON_CACHE_DIR: /cache/triton
      TORCHINDUCTOR_CACHE_DIR: /cache/torchinductor
      SGLANG_DG_CACHE_DIR: /cache/dg
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-32}

    volumes:
      - /mnt/disk1/models:/models
      - ./logs:/logs
      - ./cache/torchinductor:/cache/torchinductor
      - ./cache/triton:/cache/triton
      - ./cache/dg:/cache/dg

    ulimits:
      memlock: -1
      stack: 67108864

    entrypoint: ["python3", "-m", "sglang.launch_server"]
    command:
      - --model-path=/models/Qwen/Qwen3-8B-FP8
      - --served-model-name=qwen3-8b
      - --host=0.0.0.0
      - --port=30000
      - --trust-remote-code
      - --context-length=32768
      - --reasoning-parser=qwen3
      - --kv-cache-dtype=fp8_e4m3
      - --page-size=64
      - --chunked-prefill-size=8192
      - --max-prefill-tokens=8192
      - --schedule-conservativeness=3.3333333333
      - --cuda-graph-max-bs=8
      - --max-running-requests=32
      - --tp=2
      - --dp=2
      - --enable-dp-attention
      - --enable-dp-lm-head
      - --load-balance-method=total_tokens
      - --schedule-policy=lpm
      - --mem-fraction-static=0.80
      - --enable-metrics
      - --enable-cache-report
      - '--model-loader-extra-config={"enable_multithread_load":true,"num_threads":128}'

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:30000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 120
      start_period: 900s

    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  sglang-gateway:
    image: ${SGLANG_GATEWAY_IMAGE:-lmsysorg/sgl-model-gateway:latest}
    container_name: sglang-qwen3-gateway
    restart: always

    depends_on:
      sglang:
        condition: service_healthy

    ports:
      - "30000:30000"

    environment:
      PYTHONUNBUFFERED: "1"

    volumes:
      - /mnt/disk1/models:/models:ro

    entrypoint: ["python3", "-m", "sglang_router.launch_router"]
    command:
      - --host=0.0.0.0
      - --port=30000
      - --worker-urls=http://sglang:30000
      - --tokenizer-path=/models/Qwen/Qwen3-8B-FP8
      - --policy=cache_aware
      - --dp-aware
      - --max-idle-secs=14400
      - --health-check-endpoint=/health
      - --health-check-timeout-secs=10
      - --health-check-interval-secs=30
      - --worker-startup-timeout-secs=1800
      - --request-timeout-secs=1800

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:30000/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"
