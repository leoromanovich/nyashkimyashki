model_list:
  - model_name: sglang-dpa
    litellm_params:
      model: os.environ/LITELLM_UPSTREAM_MODEL
      api_base: http://smg:8000/v1
      api_key: dummy
    model_info:
      mode: chat

litellm_settings:
  callbacks: smg_sticky.proxy_handler_instance
  drop_params: true

general_settings:
  # The sticky hook injects only X-SMG-Routing-Key into upstream headers.
  # Keep broad client-header forwarding off for cleaner tests.
  forward_client_headers_to_llm_api: false
