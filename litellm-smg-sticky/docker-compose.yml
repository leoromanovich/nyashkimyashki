name: litellm-smg-sticky

services:
  smg:
    image: ${SMG_IMAGE:-lmsysorg/sgl-model-gateway:latest}
    container_name: smg-sticky
    restart: unless-stopped
    command:
      - --worker-urls
      - ${SGLANG_BASE_URL:-http://host.docker.internal:30000}
      - --policy
      - manual
      - --dp-aware
      - --assignment-mode
      - ${SMG_ASSIGNMENT_MODE:-min_group}
      - --max-idle-secs
      - ${SMG_MAX_IDLE_SECS:-14400}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --prometheus-host
      - 0.0.0.0
      - --prometheus-port
      - "29000"
    ports:
      - "${SMG_PORT:-8000}:8000"
      - "${SMG_PROMETHEUS_PORT:-29000}:29000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python3 - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/readiness', timeout=3)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  litellm:
    image: ${LITELLM_IMAGE:-docker.litellm.ai/berriai/litellm:main-stable}
    container_name: litellm-sticky
    restart: unless-stopped
    depends_on:
      smg:
        condition: service_healthy
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
      - --host
      - 0.0.0.0
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-sticky-test}
      LITELLM_LOG: ${LITELLM_LOG:-INFO}
      LITELLM_UPSTREAM_MODEL: ${LITELLM_UPSTREAM_MODEL:-openai/sglang-model}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./litellm/smg_sticky.py:/app/smg_sticky.py:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=3)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
