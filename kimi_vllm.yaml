services:
  vllm-kimi-k26:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.22.1}
    container_name: vllm-kimi-k26-8xh200
    volumes:
      - /models:/models
      - ${HF_CACHE:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-16}
    command:
      - /models/moonshotai/Kimi-K2.6
      - --served-model-name=kimi-k2.6
      - --trust-remote-code
      - --language-model-only
      - --tensor-parallel-size=1
      - --data-parallel-size=8
      - --enable-expert-parallel
      - --reasoning-parser=kimi_k2
      - --tool-call-parser=kimi_k2
      - --enable-auto-tool-choice
      - --max-model-len=262144
      # Keep FP8 KV parity with the SGLang reference. vLLM MLA DCP currently rejects FP8/quantized KV.
      - --kv-cache-dtype=fp8_e4m3
      # DEP runs 8 DP engines; these limits are per DP rank.
      - --kv-offloading-size=${VLLM_KV_OFFLOADING_SIZE_PER_DP:-100}
      - --kv-offloading-backend=native
      - --max-num-batched-tokens=32768
      - --max-num-seqs=${VLLM_MAX_NUM_SEQS_PER_DP:-12}
      - --gpu-memory-utilization=0.85
      - --enable-prefix-caching
      - '--speculative-config={"model":"/models/lightseekorg/kimi-k2.6-eagle3-mla","method":"eagle3","num_speculative_tokens":3}'
      - --distributed-executor-backend=mp
      - --enable-server-load-tracking
      - --enable-prompt-tokens-details
      - --disable-uvicorn-access-log
      - --host=0.0.0.0
      - --port=30000
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    shm_size: 64g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:30000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 120
      start_period: 900s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 8
              capabilities: [gpu]
