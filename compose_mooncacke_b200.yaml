services:
  mooncake_master:
    image: lmsysorg/sglang:v0.5.12.post1-cu130
    container_name: mooncake_master
    networks:
      - mooncake_net
    ipc: host
    shm_size: 32g
    ulimits:
      memlock: -1
    command:
      - mooncake_master
      - --rpc_port=50051
      - --metrics_port=9003
      - --enable_http_metadata_server=true
      - --http_metadata_server_port=8080
      - --enable_offload=true
      - --eviction_high_watermark_ratio=0.95
      - --logtostderr=true

  sglang:
    image: lmsysorg/sglang:v0.5.12.post1-cu130
    restart: "always"
    depends_on:
      - mooncake_master
    networks:
      - mooncake_net

    stop_grace_period: 1m

    ipc: host
    shm_size: 32gb

    # For faster memory alloc
    cap_add:
      - SYS_NICE
      - IPC_LOCK
    security_opt:
      - seccomp:unconfined
    # cap_add:
    #   - SYS_NICE

    ports:
      - "30000:30000"
      - "8001:8001"

    environment:
      TRITON_CACHE_DIR: '/cache/triton'
      TORCHINDUCTOR_CACHE_DIR: '/cache/torchinductor'
      SGLANG_DG_CACHE_DIR: '/cache/dg'
      OMP_NUM_THREADS: 32
      SGLANG_ENABLE_SPEC_V2: 1
      MC_STORE_MEMCPY: "1"
      MOONCAKE_OFFLOAD_GB: "6000"
      # When we specify this env var it doens't recognize it
      # Tells that it create file backend, but not really
      #SGLANG_HICACHE_FILE_BACKEND_STORAGE_DIR: '/cache/filecache'

    volumes:
      - /opt/models:/models
      - ./logs:/logs
      - ./cache/torchinductor:/cache/torchinductor
      - ./cache/triton:/cache/triton
      - ./cache/dg:/cache/dg
      - ./cache/mooncake_cache:/mooncake_cache
      # - ./cache/filecache:/tmp/hicache
      # - ./cache/filecache:/cache/filecache

    ulimits:
      memlock: -1
      stack: 67108864

    # TODO: Research schedule-convervativeness

    # https://cookbook.sglang.io/autoregressive/GLM/GLM-5
    # DP attention trades off low-concurrency latency for high-concurrency throughput
    #

    # We def. need hicache
    # --kv-cache-dtype fp8_e4m3

    # --dp 8
    # --enable-dp-attention
    #
    # --quantization modelopt_fp4
    # --model-path /models/GLM-5.1-NVFP4
    # --dsa-prefill-backend trtllm
    # --dsa-decode-backend trtllm
    # --moe-runner-backend flashinfer_trtllm
    # --enable-flashinfer-allreduce-fusion
    #
    # --enable-dp-lm-head
    # --tokenizer-worker-num 8
    # --schedule-policy lpm
    #
    # --enable-hierarchical-cache
    # --hicache-size 100
    # --hicache-write-policy write_through_selective
    # --hicache-io-backend kernel
    # --hicache-storage-prefetch-policy timeout

    # --hicache-storage-backend-extra-config '{"root_dir": "/cache/filecache"}'

    # Max running - helps with compilation
    # Attention backend nsa
    # cuda-graph-max-bs helps with compilation
    # The larger chunked-prefill-size  is tradeoff between
    # mutliple user requests and long response for a single big request
    command:
      - bash
      - -lc
      - |
        set -euo pipefail

        export MOONCAKE_OFFLOAD_FILE_STORAGE_PATH=/mooncake_cache
        export MOONCAKE_OFFLOAD_STORAGE_BACKEND_DESCRIPTOR=bucket_storage_backend
        export MOONCAKE_OFFLOAD_TOTAL_SIZE_LIMIT_BYTES=$$(python3 - <<'PY'
        import os
        print(int(os.environ.get("MOONCAKE_OFFLOAD_GB", "100")) * 1000000000)
        PY
        )
        export MOONCAKE_OFFLOAD_BUCKET_MAX_TOTAL_SIZE=$$MOONCAKE_OFFLOAD_TOTAL_SIZE_LIMIT_BYTES
        export MOONCAKE_OFFLOAD_BUCKET_EVICTION_POLICY=lru
        export MOONCAKE_OFFLOAD_USE_URING=1

        echo "Mooncake SSD offload: $$MOONCAKE_OFFLOAD_TOTAL_SIZE_LIMIT_BYTES bytes at $$MOONCAKE_OFFLOAD_FILE_STORAGE_PATH"

        exec python3 -m sglang.launch_server \
          --model-path /models/GLM-5.1-NVFP4 \
          --quantization modelopt_fp4 \
          --served-model-name glm \
          --host 0.0.0.0 \
          --port 30000 \
          --admin-api-key 9855fce633f06feb7b0e \
          --attention-backend nsa \
          --nsa-prefill-backend trtllm \
          --nsa-decode-backend trtllm \
          --moe-runner-backend flashinfer_trtllm \
          --enable-flashinfer-allreduce-fusion \
          --context-length 202752 \
          --reasoning-parser glm45 \
          --tool-call-parser glm47 \
          --trust-remote-code \
          --kv-cache-dtype fp8_e4m3 \
          --enable-hierarchical-cache \
          --hicache-io-backend kernel \
          --hicache-size 150 \
          --hicache-write-policy write_through_selective \
          --hicache-storage-prefetch-policy timeout \
          --hicache-storage-backend mooncake \
          --file-storage-path /mooncake_cache \
          --hicache-storage-backend-extra-config '{"local_hostname":"sglang","metadata_server":"http://mooncake_master:8080/metadata","master_server_address":"mooncake_master:50051","protocol":"tcp","device_name":"","global_segment_size":"64gb","check_server":false,"enable_ssd_offload":true,"ssd_offload_path":"/mooncake_cache"}' \
          --page-size 64 \
          --chunked-prefill-size 65536 \
          --max-prefill-tokens 32768 \
          --schedule-conservativeness 3.3333333333 \
          --cuda-graph-max-bs 18 \
          --max-running-requests 128 \
          --tp 8 \
          --dp 8 \
          --enable-dp-attention \
          --enable-flashinfer-allreduce-fusion \
          --enable-dp-lm-head \
          --load-balance-method total_tokens \
          --schedule-policy lpm \
          --mem-fraction-static 0.85 \
          --enable-metrics \
          --enable-custom-logit-processor \
          --enable-cache-report \
          --speculative-algorithm EAGLE \
          --speculative-num-steps 3 \
          --speculative-eagle-topk 1 \
          --speculative-num-draft-tokens 4 \
          --json-model-override-args '{"index_topk_pattern": "FFSFSSSFSSFFFSSSFFFSFSSSSSSFFSFFSFFSSFFFFFFSFFFFFSFFSSSSSSFSFFFSFSSSFSFFSFFSSS"}' \
          --model-loader-extra-config '{"enable_multithread_load":true,"num_threads":128}'

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:30000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
networks:
  mooncake_net:
    driver: bridge







